<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS LAYOUT</title>
    <style>
        * {
            margin: 0px;
        }

        nav {
            background-color: rgb(97, 177, 84);
            height: 100px;
            width: auto;
            
        }
        nav a{  
             margin-top: 40px;
            text-decoration: none;
            color: black;
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            margin: 20px;
            
        }
        nav input{
            border-radius: 5px
            ;           
            width: 400px;
            height: 20px;
        }
    

        section {
            background-color: rgb(70, 122, 167);
            height: 500px;
            width: auto;
            margin-top: 2px;
        }
        section div{
            height: 500px;
            width: 50%;
            float: left;
            background-color: yellowgreen; 
        }

        footer {
            background-color: #82bb6a;
            height: 100px;
            width: auto;
            margin-top: 2px
        }
    </style>
</head>

<body>
    <!-- CSS LAYOUT FLOAT -->
    <nav>
        <a href="">Menu</a>
        <a href="">Product</a>
        <a href="">Services</a>
        <a href="">About</a>
        <input type="text" >
    </nav>
    <section>
        <div>Hi how are you </div>
        <div>I am fine</div>
    </section>
    <footer></footer>
</body>

</html>
