<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Album</title>
    <style>
        .container{
            display: grid;
           

            /* grid-template-columns: 1fr 1fr 1fr; */
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 250px 250px 400px 200px;
            gap: 5px;

        }
        .box{
            /* height: 100px;
            width: 100px; */
            border-radius: 5px;
        }
        .other{
            height: 100px;
            width: 100px;
        }
        .box1 {
            background-color: #9ac2e6;
            grid-row-start: 1;
            grid-row-end: 3;
        }

        .box2 {
            background-color: #97cb94;
        }

        .box3 {
            background-color: #e1c68d;
            /* grid-row-start: 1;
            grid-row-end: 3; */
        }

        .box4 {
            background-color: #c874a9;
            /* grid-column-start: 1;
            grid-column-end: 3; */
        }

        .box5 {
            background-color: #4aa242;
        }

        .box6 {
            background-color: #c67464;
        }

        .box7 {
            background-color: #9da85d;
            grid-column-start: 2;
            grid-column-end: 4;
        }

        .box8 {
            background-color: #4f378c;
        }

        .box9 {
            background-color: #7eb7ae;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box box1">
            <div class="box box9 other"></div>
            <div class="box box9 other"></div>
            <div class="box box9 other"></div>
        </div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
        <div class="box box5">5</div>
        <div class="box box6">6</div>
        <div class="box box7">7</div>
        <div class="box box8">8</div>
        <div class="box box9">9</div>
    </div>
</body>

</html>
