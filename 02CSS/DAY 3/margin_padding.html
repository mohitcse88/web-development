<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin and Padding</title>
    <style>
        .padding {
           border: 2px solid black;
            /* padding: 20px 40px 60px 80px; */
            /* top right buttom left */

            /* padding: 10px 200px 100px; */
            /* top right-left buttom */

            /* padding: 20px 200px; */

            /* padding: 100px; */
            /* all side */

            padding-top: 10px;

        .margin {

            margin: 20px 200px;

            margin-right:20px ;
            margin-bottom: 30px;
            margin-left: 400px;
        }
    </style>
</head>

<body>
    <!-- Padding -->
