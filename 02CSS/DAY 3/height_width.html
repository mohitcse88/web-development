<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Height and Width</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .width_min {
            border: 2px solid #3962b4;
            min-width: 0;
            display: inline-block;
        }

        .width_max {
            border: 2px solid #3962b4;
            max-width: 100px;
            display: inline-block;
            overflow: hidden;
        }
        .height{
            border: 2px solid #3962b4;
            max-height: 100px;

        }
        .box{
            border: 2px solid #3962b4;
            display: inline-block;
            box-sizing: border-box;
            height: 160px;
            width: 160px;
            /* padding: 100px; */
        }
    </style>
</head>

<body>
    <!-- Width -->
    <p class="width_min">Lorem </p>
    <hr>
    <p class="width_max">45678900000ljfs000</p>
    <hr>
    <!-- Height -->
    <p class="height">Lorem ipsum dolor sit. Lorem ipsum dolor sit amet consectetur adipisicing elit. Inventore
        </p>
    <hr>
    <!-- Box sizing -->
    <p class="box">Lorem ipsum dolor sit.</p>
    <p class="box">Lorem ipsum dolor sit.</p>
    <p class="box">Lorem ipsum dolor sit.</p>
    <p class="box">Lorem ipsum dolor sit.</p>
    



</body>

</html>
