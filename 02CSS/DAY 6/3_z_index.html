<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z INDEX</title>
    <style> 
    div{
        border-radius: 10px;
    }
    
    
    /* z - index */
        .one{
            height: 100px;
            width: 100px;
            background-color: #6389aa;
            position: absolute;
            top: 5px;
            z-index: -1;

        }
        .two{
            height: 100px;
            width: 100px;
            background-color: #74c462;
            position: absolute;
            top: 40px;
            z-index: 2;
        }
        .three{
            height: 100px;
            width: 100px;
            background-color: #43398f;
            position: absolute;
            top: 80px;
            z-index: 3;

        }
        .four{
            height: 100px;
            width: 100px;
            background-color: #81497c;
            position: absolute;
            top: 120px;
            z-index: 4;
        }
        
</style>
</head>
<body>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, totam!</p>
     <!-- z index -->
     <div class="one">1</div>
     <div class="two">2</div>
     <div class="three">3</div>
     <div class="four">4</div>++
</body>
</html>
