<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lpu</title>
    <style>
        div {
            height: 30px;
            width: auto;
            background-image: linear-gradient(-125deg, #e11414 0%, #c300ff 29%, #ff1313 67%, #f68220 100%);
            padding-top: 10px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            position: relative;
            animation: lpu;
            animation-duration: 2s;
            animation-delay: 2s;
            animation-iteration-count: infinite;

        }

        @keyframes lpu {
            from {
                background-image: radial-gradient(red , yellow,#c300ff );
               
            }

            to {
                background-image: linear-gradient(-125deg, #e11414 0%, #c300ff 29%, #ff1313 67%, #f68220 100%);
             
            }
        }
    </style>
</head>

<body>
    <div>Join us for Freshmen Reporting and Induction 2023. Click here to view the details!</div>
</body>

</html>
