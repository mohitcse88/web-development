<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition & Tooltips</title>
    <style>
        div {
            height: 100px;
            width: 100px;
            background-color: black;

            /* transition: width 3s ease-in 2s , height 3s ease-in 3s; */
            transition: width 3s , height 3s;
            transition-timing-function: ease-in-out;
            transition-delay: 1s;

        }

        div:hover {
            width: 300px;
            height: 300px;
        }
    </style>
</head>

<body>
    <!-- Transition and Tooltips -->
    <div>
        <!-- Transition -->
    </div>

    <p title="Hello">Hello World</p>
</body>

</html>
