<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M</title>
    <style>
        div{
            margin-top: 0px;
            height: 100px;
            width: 100px;
            background-color: rgb(51, 114, 169);
            position: relative;
            animation-name: mohit;
            animation-duration: 3s;
            animation-iteration-count: infinite;
        }
        @keyframes mohit {
            0%{
                left: 0px;
                top: 400px;
                background-color: orange;
            }
            25%{
                left: 0px;
                top: 0px;
                background-color: red;
            }
            50%{
                left: 100px;
                top: 200px;
                background-color: yellow;
            }
            75%{
                left:200px ;
                top: 0px;
                background-color: greenyellow;
            }
            100%{
                left: 200px;
                top: 400px;
                background-color: pink;
            }

        }

    </style>
</head>
<body>
    <div></div>
</body>
</html>
