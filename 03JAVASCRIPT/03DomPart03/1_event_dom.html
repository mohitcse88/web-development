<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM EVENT</title>
</head>
<body>
    <h1>Hello, PW Skills</h1>
    <p id="js"></p>
    <p id="me"></p>
    <button onclick="hey()" id="jss">Submit</button>
    <button onclick="date()" id="dd">The time is?</button>
    
    <script>
        // addEventListener  click
        document.addEventListener("click",hello);
        function hello(){
            document.getElementById("js").innerText = "Namaste Bacho" ; 
        }

        document.addEventListener ("dblclick",eventDb);
        function eventDb(){
            document.getElementById("js").innerText = "Hey, How are You?"
        }

        document.addEventListener("mouseenter",eventMouse);
        function eventMouse(){
            document.getElementById("me").innerText = "MouseEnter: I'm Fine" ; 
        }

        // onclick="hey()" 
        function hey(){
            document.getElementById("jss").innerText = "PW Skills" ;
            document.getElementById("jss").style.color = "red" ; 
            document.getElementById("jss").style.fontSize = "25px" ; 
            document.getElementById("jss").style.backgroundColor = "green" ; 
            document.getElementById("jss").style.padding = "16px" ; 
            document.getElementById("jss").style.border = "2px solid yellow" ; 
        }
        function date(){
            document.getElementById("dd").innerHTML = Date();
        }


        
    </script>
</body>
</html>
