<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTRODUCTION-REACTJS</title>
</head>
<body>

    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script>
        // React Element 
        // type : "h1"
        // props : {}
        // children
        const Btn = () => React.createElement("button",{id:"btn"},React.createElement("span",{},"Submit")); // create function 

        const rootElement = document.getElementById("root"); // div selected 

        const root = ReactDOM.createRoot(rootElement); // DOM importated

        root.render(Btn()); // render the screen 

      

    </script>
</body>
</html>
