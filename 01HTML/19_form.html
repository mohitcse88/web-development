<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form | html </title>
</head>

<body>
    <!-- Form -->
    <form>
        <label for="firstName">Write Your Name : </label>
        <input type="text" name="firstName" id="firstName">
        <br><br>

        <label for="address">Write Your Address : </label>
        <textarea rows="5" cols="30" name="address" id="address"></textarea>
        <br><br>

        <label for="dob">Fill Your DOB : </label>
        <input type="date" name="dob" id="dob">
        <br><br>

        <label for="password">Enter Your Pasword : </label>
        <input type="password" id="password">
        <br><br>
        <!-- Radio button -->
        <!-- for single choice -->
        <label for="gender">Select Gender : --</label>
        <br>

        <input type="radio" id="gender_male" value="MALE" name="gender">
        <label for="gender_male">MALE</label>
        <br>

        <input type="radio" id="gender_female" value="FEMALE" name="gender">
        <label for="gender_female">FEMALE</label>
        <br>

        <input type="radio" id="gender_man" value="MAN" name="gender">
        <label for="gender_man">MAN</label>
        <br>

        <input type="radio" id="gender_woman" value="WOMAN" name="gender">
        <label for="gender_woman">WOMAN</label>
        <br><br>

        <!-- checkbox -->
        <label for="checkbox">Select Your Favorite Fruit</label>
        <br>
        <input type="checkbox" name="mango" id="mango">
        <label for="mango">Mango</label>
         <br>
       
        <input type="checkbox" name="banana" id="banana">
        <label for="banana">Banana</label>
        <br>
        
        <input type="checkbox" name="apple" id="apple">
        <label for="apple">Apple</label>
        <br>
       
        <input type="checkbox" name="orange" id="orange">
        <label for="orange">Orange</label>
        <br>
        <!-- submit -->
        <input type="submit" name="submit" id="submit-btn">



    </form>

</body>

</html>
