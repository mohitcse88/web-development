<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form method="get" target="_blank">
        <fieldset>
            <legend>User Registration Form</legend>
            
            <label for="username">Enter Your Username</label>
            <input type="text" id="username" name="username" size="70" value="yyara" placeholder="Name.." readonly autofocus>
            <br>
            <label for="useremail">Enter Your Email</label>
            <input type="email" id="useremail" name="useremail" autofocus>
            <br>
            <label for="userpassword">Enter Your password</label>
            <input type="password" id="userpassword" name="userpassword" >
            <br>
            Gender
            <br>
            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>
            <br>
            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>
            <br>
            <input type="radio" name="gender" id="transgender" value="transgender">
            <label for="transgender">Transgender</label>
            <br>
            <input type="number" min="0" max="10">

            <input type="submit" value="submit form">
        </fieldset>
    </form>
</body>
</html>
