<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <!-- Table -->
    <table border cellpadding="20px" style="text-align: center;">

            <tr>
                <th>Sub 1</th>
            <th>Sub 2</th>
            <th>Sub 3</th>
            <th>Sub 4</th>
            <th>Sub 5</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Math</td>
                <td>Science</td>
                <td>English</td>
                <td>Hindi</td>
                <td rowspan="2">Social Science</td>
            </tr>
            <tr>
                <td>Math</td>
                <td>Science</td>
                <td>English</td>
                <td>Hindi</td>
    
            </tr>
            <tr>
                <td>Math</td>
                <td colspan="2">Science</td>
                <td>Hindi</td>
                <td>Social Science</td>
            </tr>
            <tr>
                <td>Math</td>
                <td>Science</td>
                <td>English</td>
                <td>Hindi</td>
                <td rowspan="2">Social Science</td>
            </tr>
            <tr>
                <td>Math</td>
                <td>Science</td>
                <td>English</td>
                <td>Hindi</td>
             
            </tr>
        </tbody>
    </table>
    
</body>
</html>
